<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>VS Studio</title>
  <meta name="description" content="VS Studio official website." />

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      overflow-x: hidden;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    .page {
      min-height: 100vh;
      background: #000;
      display: flex;
      flex-direction: column;
    }

    header {
      width: 100%;
      background: #000;
      padding: 34px 42px 0;
      box-sizing: border-box;
    }

    .topbar {
      width: 100%;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 24px;
    }

    .site-logo {
      display: block;
      width: 300px;
      height: auto;
    }

    .language {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      padding-top: 6px;
      font-size: 13px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.78);
      white-space: nowrap;
      flex-shrink: 0;
    }

    .language:hover {
      opacity: 0.6;
    }

    .global-nav {
      margin-top: 28px;
      display: flex;
      align-items: center;
      gap: 30px;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255, 255, 255, 0.82);
    }

    .global-nav a {
      transition: opacity 0.2s ease;
    }

    .global-nav a:hover {
      opacity: 0.6;
    }

    main {
      flex: 1;
      background: #000;
      min-height: 420px;
    }

    footer {
      background: #000;
      padding: 32px 24px 26px;
      text-align: center;
      color: rgba(255, 255, 255, 0.55);
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    .social {
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 22px;
    }

    .social a {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      opacity: 0.78;
      transition: opacity 0.2s ease;
    }

    .social a:hover {
      opacity: 1;
    }

    .social img {
      display: block;
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    @media (max-width: 760px) {
      header {
        padding: 28px 24px 0;
      }

      .site-logo {
        width: 250px;
      }

      .language {
        padding-top: 4px;
        font-size: 12px;
      }

      .global-nav {
        margin-top: 24px;
        gap: 20px;
        flex-wrap: wrap;
        font-size: 12px;
      }
    }

    @media (max-width: 480px) {
      header {
        padding: 24px 20px 0;
      }

      .topbar {
        align-items: flex-start;
        gap: 12px;
      }

      .site-logo {
        width: 210px;
      }

      .language {
        padding-top: 3px;
        font-size: 11px;
        letter-spacing: 0.06em;
      }

      .global-nav {
        margin-top: 22px;
        gap: 16px;
        font-size: 11px;
      }

      main {
        min-height: 360px;
      }
    }

    @media (max-width: 360px) {
      .site-logo {
        width: 185px;
      }

      .language {
        font-size: 10px;
      }
    }
  </style>
</head>

<body>
  <div class="page">

    <header>
      <div class="topbar">
        <a href="index.html" aria-label="VS Studio Home">
          <img
            src="vs-studio-logo-red-horizontal-snk.svg"
            alt="VS Studio"
            class="site-logo"
          >
        </a>

        <a href="index.html" class="language">🌐 Japanese</a>
      </div>

      <nav class="global-nav" aria-label="Main navigation">
        <a href="index.html">Home</a>
        <a href="recruit.html">Recruit</a>
        <a href="contact.html">Contact</a>
        <a href="access.html">Access</a>
      </nav>
    </header>

    <main>
      <!-- 
        ここは意図的に空けています。
        後でオフィス写真やメインビジュアルを配置する場所です。
      -->
    </main>

    <footer>
      <div class="social" aria-label="Official social media">
        <a href="https://x.com/VS_Studio_Inc" target="_blank" rel="noopener noreferrer" aria-label="VS Studio on X">
          <img src="X.png" alt="X">
        </a>

        <a href="https://www.instagram.com/vs_studio_inc" target="_blank" rel="noopener noreferrer" aria-label="VS Studio on Instagram">
          <img src="Instagram.png" alt="Instagram">
        </a>
      </div>

      <div>©VS Studio</div>
    </footer>

  </div>
</body>
</html>
