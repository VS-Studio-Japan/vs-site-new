<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VS Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; overflow-x: hidden; }
    body { display: flex; flex-direction: column; min-height: 100vh; }

    /* --- ヘッダー設定 --- */
    header { width: 100%; padding: 30px 24px; display: flex; flex-direction: column; align-items: center; gap: 20px; position: relative; }
    .logo { font-size: 30px; font-weight: 700; letter-spacing: 0.35em; text-align: center; }
    nav { display: flex; gap: 15px; font-size: 14px; letter-spacing: 0.15em; text-transform: uppercase; }
    nav a { color: #fff; text-decoration: none; opacity: 0.85; }

    /* 言語プルダウン (スマホ・PC共通) */
    .lang-dropdown { position: relative; cursor: pointer; }
    .lang-button { display: flex; align-items: center; gap: 8px; padding: 6px 16px; border: 1px solid rgba(255,255,255,0.7); border-radius: 25px; font-size: 13px; color: #fff; user-select: none; }
    .icon-globe { width: 16px; height: 16px; fill: none; stroke: currentColor; stroke-width: 1.5; }
    .icon-arrow { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 1.5; transition: 0.3s; }
    .dropdown-content { position: absolute; top: 110%; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; min-width: 130px; display: none; z-index: 100; }
    .dropdown-content a { color: #fff; padding: 12px 20px; text-decoration: none; display: block; font-size: 13px; text-align: center; }
    .lang-dropdown.active .dropdown-content { display: block; }
    .lang-dropdown.active .icon-arrow { transform: rotate(180deg); }

    /* --- PC用レイアウト切り替え (幅768px以上) --- */
    @media (min-width: 768px) {
      header { flex-direction: row; justify-content: space-between; padding: 40px 60px; }
      .header-left { display: flex; align-items: center; gap: 50px; }
      .logo { font-size: 39px; } /* PCは大迫力のロゴ */
      nav { font-size: 16px; gap: 30px; }
      .dropdown-content { left: auto; right: 0; transform: none; }
    }

    /* --- メインコンテンツ --- */
    main { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
    .hero h1 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
    .hero p { font-size: 10px; color: rgba(255,255,255,0.7); margin-bottom: 22px; }
    .button { display: inline-block; border: 1px solid rgba(255,255,255,0.6); color: #fff; text-decoration: none; padding: 10px 24px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; transition: 0.2s; }
    .button:hover { background: #fff; color: #000; }
    footer { text-align: center; padding: 30px; font-size: 9px; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo">VS STUDIO</div>
      <nav><a href="index.html">HOME</a><a href="recruit.html">RECRUIT</a></nav>
    </div>
    <div class="lang-dropdown" id="langMenu">
      <div class="lang-button">
        <svg class="icon-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span>Japanese</span>
        <svg class="icon-arrow" viewBox="0 0 24 24"><path d="M6 9l6 6 6-6"/></svg>
      </div>
      <div class="dropdown-content">
        <a href="#" onclick="location.reload()">Japanese</a>
        <a href="en.html">English</a>
      </div>
    </div>
  </header>
  <main>
    <section class="hero">
      <h1>Welcome to VS Studio</h1>
      <p>Official Website of VS Studio</p>
      <a class="button" href="recruit.html">RECRUIT</a>
    </section>
  </main>
  <footer>© VS Studio Inc.</footer>
  <script>
    const langMenu = document.getElementById('langMenu');
    langMenu.addEventListener('click', (e) => { e.stopPropagation(); langMenu.classList.toggle('active'); });
    document.addEventListener('click', () => langMenu.classList.remove('active'));
  </script>
</body>
</html>
