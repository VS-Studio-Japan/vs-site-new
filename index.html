<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VS Studio</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 22px 24px 12px;
      text-align: center;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.35em;
      margin-bottom: 10px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 22px;
      font-size: 8px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      opacity: 0.85;
      transition: opacity 0.2s ease;
    }

    nav a:hover {
      opacity: 1;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 20px;
    }

    .hero {
      max-width: 680px;
    }

    .hero h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    .hero p {
      font-size: 9px;
      color: rgba(255,255,255,0.72);
      letter-spacing: 0.08em;
      margin-bottom: 22px;
    }

    .hero .button {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.65);
      color: #fff;
      text-decoration: none;
      padding: 8px 16px;
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: background 0.2s ease, color 0.2s ease;
    }

    .hero .button:hover {
      background: #fff;
      color: #000;
    }

    footer {
      text-align: center;
      padding: 24px 20px 28px;
      font-size: 8px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.14em;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">VS STUDIO</div>
    <nav>
      <a href="index.html">HOME</a>
      <a href="recruit.html">RECRUIT</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <h1>Welcome to VS Studio</h1>
      <p>Official Website of VS Studio</p>
      <a class="button" href="recruit.html">RECRUIT</a>
    </section>
  </main>

  <footer>
    © VS Studio Inc.
  </footer>
</body>
</html>
