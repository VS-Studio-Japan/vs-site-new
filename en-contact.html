<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONTACT | VS Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    header { width: 100%; padding: 30px 24px; display: flex; flex-direction: column; align-items: center; gap: 20px; position: relative; }
    .logo { font-size: 28px; font-weight: 700; letter-spacing: 0.35em; text-align: center; }
    nav { display: flex; gap: 15px; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; }
    nav a { color: #fff; text-decoration: none; opacity: 0.45; transition: 0.3s; }
    .lang-dropdown { position: relative; cursor: pointer; }
    .lang-button { display: flex; align-items: center; gap: 8px; padding: 6px 16px; border: 1px solid #fff; border-radius: 25px; font-size: 12px; color: #fff; background: #000; }
    .dropdown-content { position: absolute; top: 110%; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; min-width: 120px; display: none; z-index: 100; }
    .dropdown-content a { color: #fff; padding: 12px; text-decoration: none; display: block; font-size: 12px; text-align: center; }
    .lang-dropdown.active .dropdown-content { display: block; }
    @media (min-width: 768px) {
      header { flex-direction: row; justify-content: space-between; padding: 40px 60px; }
      .logo { font-size: 39px; }
      nav { font-size: 16px; gap: 30px; }
      .dropdown-content { left: auto; right: 0; transform: none; }
    }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 60px 20px; text-align: center; }
    h2 { font-size: 20px; letter-spacing: 0.2em; margin-bottom: 40px; text-transform: uppercase; }
    .contact-form { width: 100%; max-width: 500px; text-align: left; }
    .form-group { margin-bottom: 25px; }
    label { display: block; font-size: 12px; margin-bottom: 8px; color: #888; text-transform: uppercase; }
    input, textarea { width: 100%; background: transparent; border: 1px solid #333; padding: 12px; color: #fff; font-size: 14px; outline: none; }
    .submit-btn { width: 100%; background: #fff; color: #000; border: none; padding: 15px; font-size: 12px; font-weight: bold; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: 0.3s; margin-top: 20px; }
    footer { text-align: center; padding: 30px; font-size: 9px; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo">VS STUDIO</div>
      <nav>
        <a href="en.html">HOME</a>
        <a href="en-recruit.html">RECRUIT</a>
        <a href="en-contact.html" style="opacity:1;">CONTACT</a>
      </nav>
    </div>
    <div class="lang-dropdown" id="langMenu">
      <div class="lang-button"><span>English</span></div>
      <div class="dropdown-content">
        <a href="contact.html">Japanese</a>
        <a href="en-contact.html">English</a>
      </div>
    </div>
  </header>
  <main>
    <h2>Contact</h2>
    <div class="contact-form">
      <div class="form-group"><label>Full Name</label><input type="text" placeholder="Your Name"></div>
      <div class="form-group"><label>Email Address</label><input type="email" placeholder="email@example.com"></div>
      <div class="form-group"><label>Message</label><textarea rows="5" placeholder="How can we help you?"></textarea></div>
      <button class="submit-btn">Send Message</button>
    </div>
  </main>
  <footer>© VS Studio Inc.</footer>
  <script>
    const langMenu = document.getElementById('langMenu');
    langMenu.addEventListener('click', (e) => { e.stopPropagation(); langMenu.classList.toggle('active'); });
    document.addEventListener('click', () => langMenu.classList.remove('active'));
  </script>
</body>
</html>
