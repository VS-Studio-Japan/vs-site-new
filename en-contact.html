<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Studio - CONTACT</title>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 40px 20px; max-width: 600px; margin: 0 auto; text-align: center; }
        h1 { letter-spacing: 4px; font-weight: normal; margin-bottom: 40px; }
        .form-group { margin-bottom: 30px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        input[type="text"], input[type="email"], textarea {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box;
        }
        .radio-group { margin-top: 10px; }
        .radio-item { margin-bottom: 12px; display: flex; align-items: center; }
        .radio-item input { margin-right: 12px; }
        .radio-item label { display: inline; margin-bottom: 0; font-weight: normal; cursor: pointer; }
        button { 
            width: 100%; padding: 15px; background-color: #fff; color: #000; border: none; 
            font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 20px;
        }
        button:hover { background-color: #ccc; }
        #thanks_message { display: none; padding: 40px; border: 1px solid #333; }
    </style>
</head>
<body>

    <div id="form_area">
        <h1>CONTACT</h1>
        
        <form action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfuJUB7o3YCQ8xGPWTnYHeCKBsPD0TIBGf7zneo7eDyye-wqg/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">

            <div class="form-group">
                <label for="name">Name *</label>
                <input type="text" id="name" name="entry.2120017129" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address *</label>
                <input type="email" id="email" name="entry.176435036" required>
            </div>

            <div class="form-group">
                <label>Inquiry Type *</label>
                <div class="radio-group">
                    <div class="radio-item"><input type="radio" name="entry.571404175" value="採用に関するお問い合わせ" id="type1" required><label for="type1">Recruitment</label></div>
                    <div class="radio-item"><input type="radio" name="entry.571404175" value="取材に関するお問い合わせ" id="type2"><label for="type2">Media / Interview</label></div>
                    <div class="radio-item"><input type="radio" name="entry.571404175" value="その他" id="type3"><label for="type3">Other</label></div>
                </div>
            </div>

            <div class="form-group">
                <label for="message">Message (Please provide specific details) *</label>
                <textarea id="message" name="entry.1989028886" rows="5" required></textarea>
            </div>

            <button type="submit">Send Message</button>
        </form>
    </div>

    <div id="thanks_message">
        <h2>THANK YOU</h2>
        <p>Your inquiry has been submitted.</p>
        <button onclick="location.reload();" style="width: auto;">Back</button>
    </div>

    <script type="text/javascript">
        var submitted = false;
    </script>
    <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){document.getElementById('form_area').style.display='none'; document.getElementById('thanks_message').style.display='block';}"></iframe>

</body>
</html>
