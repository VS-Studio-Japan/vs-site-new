<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recruit | VS Studio</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 22px 24px 12px;
      text-align: center;
    }

    .logo {
      font-size: 13px;
      font-weight: 700;
      letter-spacing: 0.35em;
      margin-bottom: 10px;
    }

    nav {
      display: flex;
      justify-content: center;
      gap: 22px;
      font-size: 8px;
      letter-spacing: 0.2em;
    }

    nav a {
      color: rgba(255,255,255,0.45);
      text-decoration: none;
      transition: color 0.3s ease;
    }

    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 20px;
    }

    .content {
      max-width: 760px;
      text-align: center;
    }

    .content h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 24px;
      letter-spacing: 0.1em;
    }

    .content p {
      font-size: 11px;
      color: rgba(255,255,255,0.8);
      line-height: 2;
      letter-spacing: 0.08em;
      margin-bottom: 30px;
    }

    .back-link {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.65);
      color: #fff;
      text-decoration: none;
      padding: 10px 24px;
      font-size: 10px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: all 0.2s ease;
    }

    .back-link:hover {
      background: #fff;
      color: #000;
    }

    footer {
      width: 100%;
      padding: 20px 24px;
      text-align: center; /* 中央寄せに変更 */
    }

    .copyright {
      font-size: 9px;
      color: rgba(255
