<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RECRUIT | VS Studio</title>
  <style>
    /* スタイルはindex.htmlと共通 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; overflow-x: hidden; }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    header { width: 100%; padding: 30px 24px; display: flex; flex-direction: column; align-items: center; gap: 20px; position: relative; }
    .logo { font-size: 28px; font-weight: 700; letter-spacing: 0.35em; text-align: center; }
    nav { display: flex; gap: 15px; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; }
    nav a { color: #fff; text-decoration: none; opacity: 0.45; transition: 0.3s; }
    .lang-dropdown { position: relative; cursor: pointer; }
    .lang-button { display: flex; align-items: center; gap: 8px; padding: 6px 16px; border: 1px solid #fff; border-radius: 25px; font-size: 12px; color: #fff; background: #000; }
    .icon-globe { width: 14px; height: 14px; fill: none; stroke: currentColor; stroke-width: 1.5; }
    .dropdown-content { position: absolute; top: 110%; left: 50%; transform: translateX(-50%); background: #111; border: 1px solid rgba(255,255,255,0.2); border-radius: 12px; min-width: 120px; display: none; z-index: 100; }
    .dropdown-content a { color: #fff; padding: 12px; text-decoration: none; display: block; font-size: 12px; text-align: center; }
    .lang-dropdown.active .dropdown-content { display: block; }

    @media (min-width: 768px) {
      header { flex-direction: row; justify-content: space-between; padding: 40px 60px; }
      .logo { font-size: 39px; }
      nav { font-size: 16px; gap: 30px; }
      .dropdown-content { left: auto; right: 0; transform: none; }
    }

    main { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 40px 20px; }
    .coming-soon { font-size: 16px; font-weight: 700; color: #FF0000; letter-spacing: 0.1em; margin-bottom: 40px; }
    .back-link { display: inline-block; border: 1px solid rgba(255,255,255,0.6); color: #fff; text-decoration: none; padding: 10px 24px; font-size: 10px; letter-spacing: 0.15em; text-transform: uppercase; transition: 0.2s; }
    .back-link:hover { background: #fff; color: #000; }
    footer { text-align: center; padding: 30px; font-size: 9px; color: rgba(255,255,255,0.35); }
  </style>
</head>
<body>
  <header>
    <div class="header-left">
      <div class="logo">VS STUDIO</div>
      <nav>
        <a href="index.html">HOME</a>
        <a href="recruit.html" style="opacity:1;">RECRUIT</a>
        <a href="contact.html">CONTACT</a>
      </nav>
    </div>
    <div class="lang-dropdown" id="langMenu">
      <div class="lang-button">
        <svg class="icon-globe" viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
        <span>Japanese</span>
      </div>
      <div class="dropdown-content">
        <a href="#" onclick="location.reload()">Japanese</a>
        <a href="en-recruit.html">English</a>
      </div>
    </div>
  </header>
  <main>
    <div>
      <div class="coming-soon">このページは2026年6月頃公開されます。</div>
      <a href="index.html" class="back-link">Back to Home</a>
    </div>
  </main>
  <footer>© VS Studio Inc.</footer>
  <script>
    const langMenu = document.getElementById('langMenu');
    langMenu.addEventListener('click', (e) => { e.stopPropagation(); langMenu.classList.toggle('active'); });
    document.addEventListener('click', () => langMenu.classList.remove('active'));
  </script>
</body>
</html>
