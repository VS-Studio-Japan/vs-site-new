<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CONTACT | VS Studio</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; }
    body { display: flex; flex-direction: column; min-height: 100vh; }
    header { width: 100%; padding: 30px 24px; display: flex; flex-direction: column; align-items: center; gap: 20px; }
    .logo { font-size: 28px; font-weight: 700; letter-spacing: 0.35em; text-align: center; }
    nav { display: flex; gap: 15px; font-size: 13px; letter-spacing: 0.15em; text-transform: uppercase; }
    nav a { color: #fff; text-decoration: none; opacity: 0.45; }
    nav a.active { opacity: 1; }
    main { flex: 1; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
    .form-container { width: 100%; max-width: 550px; }
    h1 { font-size: 20px; letter-spacing: 0.25em; margin-bottom: 40px; text-align: center; }
    form { display: flex; flex-direction: column; gap: 25px; }
    .input-group { display: flex; flex-direction: column; gap: 10px; }
    label { font-size: 12px; color: rgba(255,255,255,0.7); }
    input, textarea { background: transparent; border: 1px solid rgba(255,255,255,0.3); padding: 14px; color: #fff; font-size: 15px; }
    .radio-group { display: flex; flex-direction: column; gap: 12px; }
    .radio-item { display: flex; align-items: center; gap: 10px; font-size: 14px; }
    button { background: #fff; color: #000; border: none; padding: 18px; font-size: 13px; letter-spacing: 0.2em; cursor: pointer; font-weight: bold; }
    #success-message { display: none; text-align: center; padding: 40px; border: 1px solid #fff; }
  </style>
</head>
<body>
  <script type="text/javascript">let submitted = false;</script>
  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){document.getElementById('contact-form').style.display='none'; document.getElementById('success-message').style.display='block';}"></iframe>

  <header>
    <div class="logo">VS STUDIO</div>
    <nav>
      <a href="index.html">HOME</a>
      <a href="recruit.html">RECRUIT</a>
      <a href="contact.html" class="active">CONTACT</a>
    </nav>
  </header>

  <main>
    <div class="form-container">
      <h1>CONTACT</h1>
      <form id="contact-form" action="https://docs.google.com/forms/d/e/1FAIpQLSeL7DbeZ0GZ2i_4UqX9t9h-B3Yp_6nSIs2zB1-jVl06C3K8wQ/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
        
        <div class="input-group">
          <label>お名前 *</label>
          <input type="text" name="entry.1809071060" required>
        </div>

        <div class="input-group">
          <label>メールアドレス *</label>
          <input type="email" name="entry.1017417535" required>
        </div>

        <div class="input-group">
          <label>お問い合わせ種別 *</label>
          <div class="radio-group">
            <label class="radio-item"><input type="radio" name="entry.156549298" value="採用に関するお問い合わせ" required> 採用に関するお問い合わせ</label>
            <label class="radio-item"><input type="radio" name="entry.156549298" value="取材に関するお問い合わせ"> 取材に関するお問い合わせ</label>
            <label class="radio-item"><input type="radio" name="entry.156549298" value="その他"> その他</label>
          </div>
        </div>

        <div class="input-group">
          <label>お問い合わせ内容 *</label>
          <textarea name="entry.134599981" rows="6" required></textarea>
        </div>

        <div class="input-group">
          <label>ご希望の返信方法</label>
          <div class="radio-group">
            <label class="radio-item"><input type="radio" name="entry.1118128362" value="メール"> メール</label>
            <label class="radio-item"><input type="radio" name="entry.1118128362" value="電話"> 電話</label>
            <label class="radio-item"><input type="radio" name="entry.1118128362" value="どちらでも可"> どちらでも可</label>
          </div>
        </div>

        <button type="submit">Send Message</button>
      </form>

      <div id="success-message">
        <p>お問い合わせありがとうございます。<br>内容を確認の上、担当者よりご連絡いたします。</p>
      </div>
    </div>
  </main>
</body>
</html>
