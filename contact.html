<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VS Studio お問い合わせ</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      min-height: 100%;
      background: #000;
      color: #fff;
      font-family: sans-serif;
      overflow-x: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      width: 100%;
      padding: 30px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      position: relative;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
    }

    .logo {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0.35em;
      text-align: center;
    }

    nav {
      display: flex;
      gap: 15px;
      font-size: 13px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    nav a {
      color: #fff;
      text-decoration: none;
      opacity: 0.45;
      transition: 0.3s;
    }

    nav a.active,
    nav a:hover {
      opacity: 1;
    }

    .lang-dropdown {
      position: relative;
      cursor: pointer;
    }

    .lang-button {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 16px;
      border: 1px solid #fff;
      border-radius: 25px;
      font-size: 12px;
      color: #fff;
      background: #000;
      transition: 0.3s;
    }

    .lang-button:hover {
      background: #fff;
      color: #000;
    }

    .icon-globe {
      width: 14px;
      height: 14px;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.5;
      flex-shrink: 0;
    }

    .dropdown-content {
      position: absolute;
      top: 110%;
      left: 50%;
      transform: translateX(-50%);
      background: #111;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      min-width: 120px;
      display: none;
      z-index: 100;
      box-shadow: 0 4px 15px rgba(0,0,0,0.5);
    }

    .dropdown-content a {
      color: #fff;
      padding: 12px;
      text-decoration: none;
      display: block;
      font-size: 12px;
      text-align: center;
      transition: 0.2s;
    }

    .dropdown-content a:hover {
      background: rgba(255,255,255,0.1);
    }

    .lang-dropdown.active .dropdown-content {
      display: block;
    }

    @media (min-width: 768px) {
      header {
        flex-direction: row;
        justify-content: space-between;
        align-items: flex-start;
        padding: 40px 60px;
      }

      .header-left {
        align-items: flex-start;
      }

      .logo {
        font-size: 39px;
      }

      nav {
        font-size: 16px;
        gap: 30px;
      }

      .dropdown-content {
        left: auto;
        right: 0;
        transform: none;
      }
    }

    main {
      flex: 1;
      width: 100%;
      padding: 40px 20px;
    }

    .contact-container {
      max-width: 600px;
      margin: 0 auto;
      text-align: center;
    }

    h1 {
      letter-spacing: 4px;
      font-weight: normal;
      margin-bottom: 40px;
    }

    .form-group {
      margin-bottom: 30px;
      text-align: left;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 0.9rem;
    }

    input[type="text"],
    input[type="email"],
    textarea {
      width: 100%;
      padding: 12px;
      background: #000;
      border: 1px solid #333;
      color: #fff;
      box-sizing: border-box;
      outline: none;
    }

    .radio-group {
      margin-top: 10px;
    }

    .radio-item {
      margin-bottom: 12px;
      display: flex;
      align-items: center;
    }

    .radio-item input {
      margin-right: 12px;
      cursor: pointer;
    }

    .radio-item label {
      display: inline;
      margin-bottom: 0;
      font-weight: normal;
      cursor: pointer;
    }

    button {
      width: 100%;
      padding: 15px;
      background-color: #fff;
      color: #000;
      border: none;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 2px;
      margin-top: 20px;
    }

    button:hover {
      background-color: #ccc;
    }

    #thanks_message {
      display: none;
      padding: 40px;
      border: 1px solid #333;
      margin-top: 50px;
    }

    .home-button {
      width: auto;
      padding: 10px 40px;
    }

    footer {
      text-align: center;
      padding: 30px;
      font-size: 9px;
      color: rgba(255,255,255,0.35);
    }
  </style>
</head>
<body>

  <header>
    <div class="header-left">
      <div class="logo">VS STUDIO</div>
      <nav>
        <a href="index.html">HOME</a>
        <a href="recruit.html">RECRUIT</a>
        <a href="contact.html" class="active">CONTACT</a>
      </nav>
    </div>

    <div class="lang-dropdown" id="langMenu">
      <div class="lang-button">
        <svg class="icon-globe" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10"></circle>
          <path d="M2 12h20M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path>
        </svg>
        <span>Japanese</span>
      </div>
      <div class="dropdown-content">
        <a href="contact.html">Japanese</a>
        <a href="en-contact.html">English</a>
      </div>
    </div>
  </header>

  <main>
    <div class="contact-container">
      <div id="form_area">
        <h1>CONTACT</h1>

        <form action="https://docs.google.com/forms/d/e/1FAIpQLSfuJUB7o3YCQ8xGPWTnYHeCKBsPD0TIBGf7zneo7eDyye-wqg/formResponse" method="POST" target="hidden_iframe" onsubmit="submitted=true;">
          
          <div class="form-group">
            <label>お名前 *</label>
            <input type="text" name="entry.1207021558" required>
          </div>
          
          <div class="form-group">
            <label>メールアドレス *</label>
            <input type="email" name="entry.1665471310" required>
          </div>
          
          <div class="form-group">
            <label>お問い合わせ種別 *</label>
            <div class="radio-group">
              <div class="radio-item">
                <input type="radio" name="entry.267130849" value="採用に関するお問い合わせ" id="t1" required>
                <label for="t1">採用に関するお問い合わせ</label>
              </div>

              <div class="radio-item">
                <input type="radio" name="entry.267130849" value="取材に関するお問い合わせ" id="t2">
                <label for="t2">取材に関するお問い合わせ</label>
              </div>

              <div class="radio-item">
                <input type="radio" name="entry.267130849" value="その他" id="t3">
                <label for="t3">その他</label>
              </div>
            </div>
          </div>
          
          <div class="form-group">
            <label>お問い合わせ内容 *</label>
            <textarea name="entry.1661004559" rows="5" required></textarea>
          </div>
          
          <button type="submit">Send Message</button>
        </form>
      </div>

      <div id="thanks_message">
        <h1>THANK YOU</h1>
        <p>お問い合わせを受け付けました。</p>
        <button class="home-button" onclick="window.location.href='index.html';">HOME</button>
      </div>
    </div>
  </main>

  <footer>© VS Studio Inc.</footer>

  <script>
    const langMenu = document.getElementById('langMenu');

    langMenu.addEventListener('click', (e) => {
      e.stopPropagation();
      langMenu.classList.toggle('active');
    });

    document.addEventListener('click', () => {
      langMenu.classList.remove('active');
    });

    var submitted = false;
  </script>

  <iframe name="hidden_iframe" id="hidden_iframe" style="display:none;" onload="if(submitted){document.getElementById('form_area').style.display='none'; document.getElementById('thanks_message').style.display='block';}"></iframe>

</body>
</html>
