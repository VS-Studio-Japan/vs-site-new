<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VS Studio お問い合わせ</title>
    <style>
        /* 画像 image_814518.jpg の黒背景デザインに準拠 */
        body { background-color: #000; color: #fff; font-family: sans-serif; padding: 40px 20px; max-width: 600px; margin: 0 auto; text-align: center; }
        h1 { letter-spacing: 4px; font-weight: normal; margin-bottom: 40px; }
        .form-group { margin-bottom: 30px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; }
        input[type="text"], input[type="email"], select, textarea {
            width: 100%; padding: 12px; background: #000; border: 1px solid #333; color: #fff; box-sizing: border-box;
        }
        .radio-group { margin-top: 10px; }
        .radio-item { margin-bottom: 8px; display: flex; align-items: center; }
        .radio-item input { margin-right: 10px; }
        .radio-item label { display: inline; margin-bottom: 0; font-weight: normal; }
        button { 
            width: 100%; padding: 15px; background-color: #fff; color: #000; border: none; 
            font-weight: bold; cursor: pointer; letter-spacing: 2px; margin-top: 20px;
        }
        button:hover { background-color: #ccc; }
    </style>
</head>
<body>

    <h1>CONTACT</h1>

    <form action="https://docs.google.com/forms/u/0/d/e/1FAIpQLSfuJUB7o3YCQ8xGPWTnYHeCKBsPD0TIBGf7zneo7eDyye-wqg/formResponse" method="POST">

        <div class="form-group">
            <label for="name">お名前 *</label>
            <input type="text" id="name" name="entry.2120017129" required>
        </div>

        <div class="form-group">
            <label for="email">メールアドレス *</label>
            <input type="email" id="email" name="entry.176435036" required>
        </div>

        <div class="form-group">
            <label for="type">お問い合わせ種別 *</label>
            <div class="radio-group">
                <div class="radio-item"><input type="radio" name="entry.571404175" value="採用に関するお問い合わせ" id="type1" required><label for="type1">採用に関するお問い合わせ</label></div>
                <div class="radio-item"><input type="radio" name="entry.571404175" value="取材に関するお問い合わせ" id="type2"><label for="type2">取材に関するお問い合わせ</label></div>
                <div class="radio-item"><input type="radio" name="entry.571404175" value="その他" id="type3"><label for="type3">その他</label></div>
            </div>
        </div>

        <div class="form-group">
            <label for="message">お問い合わせ内容（具体的な詳細をご記入ください） *</label>
            <textarea id="message" name="entry.1989028886" rows="5" required></textarea>
        </div>

        <div class="form-group">
            <label>ご希望の返信方法</label>
            <div class="radio-group">
                <div class="radio-item"><input type="radio" name="entry.1778134371" value="メール" id="res1" required><label for="res1">メール</label></div>
                <div class="radio-item"><input type="radio" name="entry.1778134371" value="電話" id="res2"><label for="res2">電話</label></div>
                <div class="radio-item"><input type="radio" name="entry.1778134371" value="どちらでも可" id="res3"><label for="res3">どちらでも可</label></div>
            </div>
        </div>

        <button type="submit">Send Message</button>

    </form>

</body>
</html>
