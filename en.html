  <style>

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; background: #000; color: #fff; font-family: Arial, sans-serif; }

    .icon-arrow { width: 10px; height: 10px; fill: none; stroke: currentColor; stroke-width: 1.5; }

    main { flex: 1; display: flex; align-items: center; justify-content: center; text-align: center; padding: 20px; }
    .hero h1 { font-size: 18px; font-weight: 600; margin-bottom: 10px; }
    .hero p { font-size: 9px; color: rgba(255,255,255,0.7); letter-spacing: 0.08em; margin-bottom: 22px; }
    .button { display: inline-block; border: 1px solid rgba(255,255,255,0.6); color: #fff; text-decoration: none; padding: 8px 16px; font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; transition: 0.2s; }
    .button:hover { background: #fff; color: #000; }
    footer { text-align: center; padding: 24px; font-size: 9px; color: rgba(255,255,255,0.35); letter-spacing: 0.1em; }
